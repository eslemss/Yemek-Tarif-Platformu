<div class="alert alert-danger text-center m-3" *ngIf="errorMessage">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    {{ errorMessage }}
</div>

<div class="container py-5 d-flex justify-content-center">
    <div class="card shadow-lg" style="max-width: 400px; width: 100%;">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0"><i class="bi bi-person-badge me-2"></i>Admin Girişi</h4>
        </div>
        
        <div class="card-body p-4">
            <form #authForm="ngForm" (ngSubmit)="login(authForm)" novalidate>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Kullanıcı Adı</label>
                    <input type="text" 
                           name="username" 
                           class="form-control" 
                           [(ngModel)]="username" 
                           required 
                           placeholder="Kullanıcı adınızı girin">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Parola</label>
                    <input type="password" 
                           name="password" 
                           class="form-control" 
                           [(ngModel)]="password" 
                           required 
                           placeholder="Parolanızı girin">
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" 
                            class="btn btn-primary" 
                            [disabled]="authForm.invalid">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Giriş Yap
                    </button>
                    
                    <button type="button" 
                            routerLink="/" 
                            class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i> Siteye Dön
                    </button>
                </div>
            </form>
        </div>
        <div class="card-footer text-muted text-center small">
            Yemektarif Yönetim Paneli v1.0
        </div>
    </div>
</div>
