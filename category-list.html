<div class="container-fluid mt-4 animate__animated animate__fadeIn">
  <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
    
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
      <h4 class="mb-0 fw-bold text-dark">
        <i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>Kategori Listesi
      </h4>
      <button routerLink="/admin/main/categories/add" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold">
        <i class="bi bi-plus-lg me-2"></i>Yeni Kategori Ekle
      </button>
    </div>

    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light text-uppercase small fw-bold text-muted">
            <tr>
              <th class="ps-4 py-3" style="width: 100px;">ID</th>
              <th class="py-3">Kategori Adı</th>
              <th class="text-end pe-4 py-3">İşlemler</th>
            </tr>
          </thead>
          <tbody>
            @for (cat of categories; track cat.id) {
              <tr>
                <td class="ps-4 text-muted small">#{{ cat.id }}</td>
                <td>
                  <span class="fw-bold text-dark">{{ cat.name }}</span>
                </td>
                <td class="text-end pe-4">
                  <button [routerLink]="['/admin/main/categories/edit', cat.id]" 
                          class="btn btn-sm btn-outline-primary me-2 rounded-3 px-3">
                    <i class="bi bi-pencil-square me-1"></i> Düzenle
                  </button>
                <button (click)="deleteCategory(cat)"   
        class="btn btn-sm btn-outline-danger rounded-3 px-3">
  <i class="bi bi-trash3 me-1"></i> Sil
</button>
                </td>
              </tr>
            } @empty {
              <tr>
                <td colspan="3" class="text-center py-5">
                  <div class="py-4 text-muted">
                    <i class="bi bi-folder2-open display-4 d-block mb-3"></i>
                    <p>Henüz kategori bulunmuyor.</p>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
