<div class="container-fluid mt-4 animate__animated animate__fadeInRight">
  <div class="card shadow-sm border-0 rounded-4 p-4 p-lg-5">
    <div class="d-flex align-items-center mb-4">
      <div class="icon-box bg-primary-subtle p-3 rounded-3 me-3">
        <i class="bi" [ngClass]="editing ? 'bi-pencil-square text-primary' : 'bi-plus-circle text-success'" style="font-size: 1.5rem;"></i>
      </div>
      <h3 class="fw-bold mb-0">{{ editing ? 'Kategoriyi Güncelle' : 'Yeni Kategori Tanımla' }}</h3>
    </div>

    <form #form="ngForm" (ngSubmit)="save(form)" novalidate>
      <div class="row g-4">
        <div class="col-md-12">
          <label class="form-label fw-bold text-muted small">KATEGORİ ADI</label>
          <input type="text" 
                 name="name" 
                 [(ngModel)]="category.name" 
                 class="form-control form-control-lg rounded-3 shadow-none border-2" 
                 placeholder="Örn: Zeytinyağlılar" 
                 required 
                 pattern="^[a-zA-ZçğıöşüÇĞİÖŞÜ\s]+$" 
                 #name="ngModel"
                 [class.is-invalid]="name.invalid && name.touched">
          
          <div class="invalid-feedback" *ngIf="name.errors?.['required']">
            Lütfen bir kategori adı giriniz.
          </div>
          <div class="invalid-feedback" *ngIf="name.errors?.['pattern']">
            Kategori adı sadece harflerden oluşmalıdır (Sayı içeremez).
          </div>
        </div>

        <div class="col-12 mt-5 border-top pt-4">
          <div class="d-flex gap-3">
            <button type="submit" 
                    class="btn btn-primary px-5 py-2 rounded-pill shadow fw-bold" 
                    [disabled]="form.invalid">
              <i class="bi bi-check2-circle me-2"></i>
              {{ editing ? 'Güncellemeyi Tamamla' : 'Kategoriyi Oluştur' }}
            </button>
            <button type="button" 
                    routerLink="/admin/main/categories" 
                    class="btn btn-light px-5 py-2 rounded-pill border fw-medium text-muted">
              Listeye Dön
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
